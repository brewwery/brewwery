appId: com.brewwery.app
productName: Brewwery
executableName: Brewwery
artifactName: Brewwery-${version}-mac-${arch}.${ext}
directories:
  output: dist-packages
files:
  - out/**/*
  - package.json
  - "!node_modules/@brewwery/brewwery-core/target/**"
  - "!node_modules/@brewwery/brewwery-core/src/**"
  - "!node_modules/@brewwery/brewwery-core/Cargo.*"
  - "!node_modules/@brewwery/brewwery-core/build.rs"
asarUnpack:
  - node_modules/@brewwery/brewwery-core/**/*.node
mac:
  icon: assets/brewwery-icon.png
  category: public.app-category.utilities
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.inherit.plist
  extendInfo:
    CFBundleName: Brewwery
    CFBundleDisplayName: Brewwery
    CFBundleExecutable: Brewwery
    CFBundleIdentifier: com.brewwery.app
    LSApplicationCategoryType: public.app-category.utilities
  target:
    - target: dmg
    - target: zip
dmg:
  title: Brewwery ${version}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
